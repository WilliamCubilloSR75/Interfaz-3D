<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo AR MindAR</title>
    <!-- Usamos A-Frame 1.5.0 para garantizar plena compatibilidad con MindAR 1.2.5 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <!-- 
      - mindar-image configurado usando 'imageTargetSrc' y ruta relativa local para facilitar pruebas.
      - Parámetros de 'renderer' corregidos separándolos con punto y coma ';'.
    -->
    <a-scene
        mindar-image="imageTargetSrc: Target/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 10;"
        color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true;" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        <a-assets>
            <img id="card" src="Target/s-l1600.webp" />
            <a-asset-item id="avatarModel" src="Target/TocaDiscos/TocaDiscos.gltf"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
            <!-- Etiqueta a-gltf-model cerrada correctamente al final -->
            <a-gltf-model rotation="0 0 0" position="0 0 1" scale="0.2 0.2 0.2" src="#avatarModel"> </a-gltf-model>
        </a-entity>
    </a-scene>
</body>

</html>
